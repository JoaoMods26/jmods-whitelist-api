<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jmods — Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #111; border: 1px solid #222; border-radius: 12px; padding: 2rem; width: 340px; text-align: center; }
  .login-box h1 { font-size: 18px; margin-bottom: 4px; }
  .login-box p { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  #panel { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 2rem; }
  .stat { background: #111; border: 1px solid #222; border-radius: 10px; padding: 1rem; }
  .stat-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 500; }
  .card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 14px; font-weight: 500; margin-bottom: 1rem; color: #e0e0e0; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .form-full { margin-bottom: 8px; }
  input, select { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #e0e0e0; outline: none; }
  input:focus, select:focus { border-color: #444; }
  .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.8; }
  .btn-primary { background: #1a3a5c; color: #7eb8f7; border-color: #2a5a8c; }
  .btn-warning { background: #3a2a0a; color: #f0a030; border-color: #5a4010; }
  .btn-success { background: #0a2a1a; color: #40c070; border-color: #1a5a30; }
  .btn-danger  { background: #2a0a0a; color: #f07070; border-color: #5a1a1a; }
  .btn-neutral { background: #1a1a2a; color: #9090d0; border-color: #2a2a5a; }
  .btn-preset  { background: #1a1a1a; color: #aaa; border-color: #333; padding: 4px 8px; font-size: 11px; border-radius: 6px; cursor: pointer; border: 1px solid; }
  .btn-preset:hover { background: #222; border-color: #555; color: #e0e0e0; }
  .btn-preset.selected { background: #1a3a5c; color: #7eb8f7; border-color: #2a5a8c; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .presets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .presets-label { font-size: 11px; color: #555; margin-bottom: 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px 12px; text-align: left; font-weight: 500; color: #666; border-bottom: 1px solid #222; white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.banned td { opacity: 0.4; text-decoration: line-through; }
  tr.paused td { opacity: 0.6; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
  .badge-global  { background: #1a3a5c; color: #7eb8f7; }
  .badge-script  { background: #2a2a2a; color: #888; }
  .badge-active  { background: #0a2a1a; color: #40c070; }
  .badge-banned  { background: #2a0a0a; color: #f07070; }
  .badge-paused  { background: #3a2a0a; color: #f0a030; }
  .badge-expired { background: #2a2a2a; color: #666; }
  .actions { display: flex; gap: 4px; justify-content: flex-end; flex-wrap: wrap; }
  .empty { text-align: center; padding: 3rem; color: #444; font-size: 14px; }
  .msg { font-size: 12px; margin-top: 8px; padding: 8px 12px; border-radius: 8px; }
  .msg-error   { background: #2a0a0a; color: #f07070; border: 1px solid #5a1a1a; }
  .msg-success { background: #0a2a1a; color: #40c070; border: 1px solid #1a5a30; }
  .hint { font-size: 11px; color: #555; margin-top: 4px; }
  .table-wrap { overflow-x: auto; }
  .search-bar { display: flex; gap: 8px; margin-bottom: 1rem; }
  .search-bar input { flex: 1; }
  .expires-soon { color: #f0a030; font-size: 12px; }
  .expires-never { color: #555; font-size: 12px; }
  .expires-ok { color: #666; font-size: 12px; }
  .section-divider { border: none; border-top: 1px solid #222; margin: 1rem 0; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Jmods Panel</h1>
    <p>Acceso restringido</p>
    <input type="password" id="password-input" placeholder="Contraseña de admin..." style="margin-bottom:12px;" />
    <button class="btn btn-primary" style="width:100%;" onclick="login()">Entrar</button>
    <div id="login-error" class="msg msg-error" style="display:none;">Contraseña incorrecta</div>
  </div>
</div>

<div id="panel">
  <div class="header">
    <div>
      <h1 style="font-size:20px;font-weight:500;">Jmods Whitelist Panel</h1>
      <p style="font-size:13px;color:#666;margin-top:4px;">joao_mods</p>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-neutral" onclick="fetchUsers()">↻ Refrescar</button>
      <button class="btn btn-danger" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">—</div></div>
    <div class="stat"><div class="stat-label">Activos</div><div class="stat-value" style="color:#40c070" id="stat-active">—</div></div>
    <div class="stat"><div class="stat-label">Pausados</div><div class="stat-value" style="color:#f0a030" id="stat-paused">—</div></div>
    <div class="stat"><div class="stat-label">Baneados</div><div class="stat-value" style="color:#f07070" id="stat-banned">—</div></div>
  </div>

  <!-- FORMULARIO AGREGAR -->
  <div class="card">
    <div class="card-title">Agregar usuario</div>

    <div class="form-grid">
      <input id="new-username" placeholder="Username de Roblox" />
      <input id="new-userid" placeholder="UserId (número)" type="number" />
    </div>

    <div class="form-full">
      <input id="new-hwid" placeholder="HWID (del embed de Discord)" />
    </div>

    <div class="form-grid-3">
      <div>
        <input id="new-placeid" placeholder="PlaceId del juego" type="number" value="0" />
        <p class="hint">0 = todos los juegos</p>
      </div>
      <div>
        <select id="new-script">
          <option value="global">global (todos los scripts)</option>
          <option value="Jailxd">Jailxd</option>
          <option value="BloxVIP">BloxVIP</option>
        </select>
        <p class="hint">Lista de acceso</p>
      </div>
      <div>
        <input id="new-notes" placeholder="Notas (opcional)" />
        <p class="hint">Ej: pagó por PayPal</p>
      </div>
    </div>

    <hr class="section-divider">

    <div class="presets-label">Duración del acceso:</div>
    <div class="presets" id="preset-buttons">
      <button class="btn-preset" onclick="selectPreset(this, 0)">♾️ Permanente</button>
      <button class="btn-preset" onclick="selectPreset(this, 1)">1 día</button>
      <button class="btn-preset" onclick="selectPreset(this, 2)">2 días</button>
      <button class="btn-preset" onclick="selectPreset(this, 3)">3 días</button>
      <button class="btn-preset" onclick="selectPreset(this, 5)">5 días</button>
      <button class="btn-preset" onclick="selectPreset(this, 7)">1 semana</button>
      <button class="btn-preset" onclick="selectPreset(this, 14)">2 semanas</button>
      <button class="btn-preset" onclick="selectPreset(this, 21)">3 semanas</button>
      <button class="btn-preset" onclick="selectPreset(this, 30)">1 mes</button>
      <button class="btn-preset" onclick="selectPreset(this, 60)">2 meses</button>
      <button class="btn-preset" onclick="selectPreset(this, 90)">3 meses</button>
      <button class="btn-preset" onclick="selectPreset(this, 180)">6 meses</button>
      <button class="btn-preset" onclick="selectPreset(this, 365)">1 año</button>
      <button class="btn-preset" onclick="selectPreset(this, -1)">📅 Fecha exacta</button>
    </div>

    <div id="custom-date-wrap" style="display:none;margin-bottom:8px;">
      <input id="new-expires" type="date" />
    </div>

    <div id="expires-preview" style="font-size:12px;color:#666;margin-bottom:12px;min-height:18px;"></div>

    <button class="btn btn-primary" onclick="addUser()" style="width:100%;">+ Agregar usuario</button>
    <div id="add-msg" style="display:none;"></div>
  </div>

  <!-- TABLA USUARIOS -->
  <div class="card">
    <div class="card-title">Usuarios registrados</div>
    <div class="search-bar">
      <input id="search-input" placeholder="Buscar por username..." oninput="filterUsers()" />
      <select id="filter-status" onchange="filterUsers()" style="width:auto;min-width:130px;">
        <option value="all">Todos</option>
        <option value="active">Activos</option>
        <option value="paused">Pausados</option>
        <option value="banned">Baneados</option>
        <option value="expired">Expirados</option>
      </select>
    </div>
    <div class="table-wrap">
      <div id="user-table-container"><div class="empty">Cargando...</div></div>
    </div>
  </div>
</div>

<script>
let adminPassword = ''
let users = []
let selectedDays = 0

// ── PRESETS ──────────────────────────────────────
function selectPreset(btn, days) {
    document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('selected'))
    btn.classList.add('selected')
    selectedDays = days

    const wrap = document.getElementById('custom-date-wrap')
    const preview = document.getElementById('expires-preview')

    if (days === -1) {
        wrap.style.display = 'block'
        preview.textContent = ''
    } else {
        wrap.style.display = 'none'
        document.getElementById('new-expires').value = ''
        if (days === 0) {
            preview.textContent = '♾️ Sin fecha de expiración — acceso permanente'
            preview.style.color = '#40c070'
        } else {
            const date = new Date()
            date.setDate(date.getDate() + days)
            preview.textContent = '📅 Expira el ' + date.toLocaleDateString('es', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            })
            preview.style.color = '#7eb8f7'
        }
    }
}

function getExpiresTimestamp() {
    if (selectedDays === 0) return 0
    if (selectedDays === -1) {
        const val = document.getElementById('new-expires').value
        if (!val) return 0
        return Math.floor(new Date(val).getTime() / 1000)
    }
    const date = new Date()
    date.setDate(date.getDate() + selectedDays)
    date.setHours(23, 59, 59, 0)
    return Math.floor(date.getTime() / 1000)
}

// ── AUTH ─────────────────────────────────────────
async function login() {
    const pw = document.getElementById('password-input').value.trim()
    if (!pw) return
    adminPassword = pw
    const errEl = document.getElementById('login-error')
    errEl.style.display = 'none'
    const ok = await fetchUsers()
    if (ok) {
        document.getElementById('login-screen').style.display = 'none'
        document.getElementById('panel').style.display = 'block'
    } else {
        errEl.style.display = 'block'
        adminPassword = ''
    }
}

function logout() {
    adminPassword = ''
    document.getElementById('login-screen').style.display = 'flex'
    document.getElementById('panel').style.display = 'none'
    document.getElementById('password-input').value = ''
}

document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login()
})

// ── FETCH ─────────────────────────────────────────
async function fetchUsers() {
    try {
        const res = await fetch('/api/admin', {
            headers: { 'x-admin-password': adminPassword }
        })
        if (res.status === 403) return false
        const data = await res.json()
        users = data.users || []
        renderTable(users)
        updateStats()
        return true
    } catch { return false }
}

// ── STATS ─────────────────────────────────────────
function updateStats() {
    const now = Date.now() / 1000
    const banned  = users.filter(u => u.banned).length
    const paused  = users.filter(u => !u.active && !u.banned).length
    const expired = users.filter(u => !u.banned && u.active && u.expires !== 0 && now > u.expires).length
    const active  = users.filter(u => u.active && !u.banned && (u.expires === 0 || now <= u.expires)).length
    document.getElementById('stat-total').textContent  = users.length
    document.getElementById('stat-active').textContent = active
    document.getElementById('stat-paused').textContent = paused + expired
    document.getElementById('stat-banned').textContent = banned
}

// ── STATUS ────────────────────────────────────────
function getStatus(u) {
    if (u.banned) return 'banned'
    if (!u.active) return 'paused'
    if (u.expires !== 0 && Date.now() / 1000 > u.expires) return 'expired'
    return 'active'
}

function formatExpires(ts) {
    if (!ts || ts === 0) return '<span class="expires-never">♾️ Nunca</span>'
    const now = Date.now() / 1000
    const date = new Date(ts * 1000)
    const dateStr = date.toLocaleDateString('es')
    const daysLeft = Math.ceil((ts - now) / 86400)

    if (now > ts) {
        return `<span class="expires-soon">⚠️ Expiró ${dateStr}</span>`
    } else if (daysLeft <= 3) {
        return `<span class="expires-soon">⚠️ ${dateStr} (${daysLeft}d)</span>`
    } else {
        return `<span class="expires-ok">${dateStr} (${daysLeft}d)</span>`
    }
}

function formatPlaceId(pid) {
    if (!pid || pid === 0) return '<span style="color:#555;font-size:12px;">Todos</span>'
    return `<a href="https://www.roblox.com/games/${pid}" target="_blank" style="color:#7eb8f7;text-decoration:none;font-size:12px;">${pid}</a>`
}

// ── FILTRO ────────────────────────────────────────
function filterUsers() {
    const search = document.getElementById('search-input').value.toLowerCase()
    const status = document.getElementById('filter-status').value
    const now = Date.now() / 1000

    const filtered = users.filter(u => {
        const matchSearch = u.username.toLowerCase().includes(search)
        let s = getStatus(u)
        const matchStatus = status === 'all' || s === status
        return matchSearch && matchStatus
    })

    renderTable(filtered)
}

// ── TABLA ─────────────────────────────────────────
function renderTable(list) {
    const container = document.getElementById('user-table-container')
    if (!list || list.length === 0) {
        container.innerHTML = '<div class="empty">No hay usuarios</div>'
        return
    }

    const rows = list.map(u => {
        const status = getStatus(u)
        const statusBadge = {
            active:  '<span class="badge badge-active">Activo</span>',
            banned:  '<span class="badge badge-banned">Baneado</span>',
            paused:  '<span class="badge badge-paused">Pausado</span>',
            expired: '<span class="badge badge-expired">Expirado</span>'
        }[status]

        const scriptBadge = u.script_name === 'global'
            ? '<span class="badge badge-global">global</span>'
            : `<span class="badge badge-script">${u.script_name}</span>`

        const pauseBtn = u.active
            ? `<button class="btn btn-warning btn-sm" onclick="toggleActive('${u.id}', false)">Pausar</button>`
            : `<button class="btn btn-success btn-sm" onclick="toggleActive('${u.id}', true)">Activar</button>`

        const banBtn = u.banned
            ? `<button class="btn btn-neutral btn-sm" onclick="toggleBan('${u.id}', false)">Desbanear</button>`
            : `<button class="btn btn-danger btn-sm" onclick="toggleBan('${u.id}', true)">Banear</button>`

        const rowClass = u.banned ? 'banned' : (!u.active || status === 'expired' ? 'paused' : '')
        const notes = u.notes ? `<span style="font-size:11px;color:#555;" title="${u.notes}">📝 ${u.notes.substring(0,20)}${u.notes.length>20?'...':''}</span>` : ''

        return `
        <tr class="${rowClass}">
            <td>
                <div style="font-weight:500;">${u.username}</div>
                ${notes}
            </td>
            <td style="color:#666;font-size:12px;">${u.user_id}</td>
            <td>${scriptBadge}</td>
            <td>${formatPlaceId(u.place_id)}</td>
            <td>${formatExpires(u.expires)}</td>
            <td>${statusBadge}</td>
            <td><div class="actions">
                ${pauseBtn}
                ${banBtn}
                <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">Borrar</button>
            </div></td>
        </tr>`
    }).join('')

    container.innerHTML = `
    <table>
        <thead><tr>
            <th>Usuario</th><th>UserId</th><th>Lista</th>
            <th>Juego</th><th>Expira</th><th>Estado</th>
            <th style="text-align:right;">Acciones</th>
        </tr></thead>
        <tbody>${rows}</tbody>
    </table>`
}

// ── AGREGAR ───────────────────────────────────────
async function addUser() {
    const username    = document.getElementById('new-username').value.trim()
    const user_id     = document.getElementById('new-userid').value.trim()
    const hwid        = document.getElementById('new-hwid').value.trim()
    const script_name = document.getElementById('new-script').value
    const place_id    = document.getElementById('new-placeid').value.trim()
    const notes       = document.getElementById('new-notes').value.trim()
    const msgEl       = document.getElementById('add-msg')

    if (!username || !user_id || !hwid) {
        msgEl.className = 'msg msg-error'
        msgEl.textContent = 'Rellena username, UserId y HWID'
        msgEl.style.display = 'block'
        return
    }

    const expires = getExpiresTimestamp()

    const res = await fetch('/api/admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
        body: JSON.stringify({
            username, user_id, hwid, script_name, expires, notes,
            place_id: place_id ? parseInt(place_id) : 0
        })
    })
    const data = await res.json()

    if (data.success) {
        msgEl.className = 'msg msg-success'
        msgEl.textContent = '✓ Usuario agregado correctamente'
        msgEl.style.display = 'block'
        document.getElementById('new-username').value = ''
        document.getElementById('new-userid').value   = ''
        document.getElementById('new-hwid').value     = ''
        document.getElementById('new-placeid').value  = '0'
        document.getElementById('new-notes').value    = ''
        document.getElementById('expires-preview').textContent = ''
        document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('selected'))
        selectedDays = 0
        fetchUsers()
        setTimeout(() => msgEl.style.display = 'none', 3000)
    } else {
        msgEl.className = 'msg msg-error'
        msgEl.textContent = 'Error: ' + (data.error || 'desconocido')
        msgEl.style.display = 'block'
    }
}

// ── ACCIONES ──────────────────────────────────────
async function toggleActive(id, active) {
    await fetch('/api/admin', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
        body: JSON.stringify({ id, active })
    })
    fetchUsers()
}

async function toggleBan(id, banned) {
    await fetch('/api/admin', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
        body: JSON.stringify({ id, banned })
    })
    fetchUsers()
}

async function deleteUser(id) {
    if (!confirm('¿Borrar este usuario permanentemente?')) return
    await fetch('/api/admin', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
        body: JSON.stringify({ id })
    })
    fetchUsers()
}
</script>
</body>
</html>
