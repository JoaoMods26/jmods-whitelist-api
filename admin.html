<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jmods — Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #111; border: 1px solid #222; border-radius: 12px; padding: 2rem; width: 340px; text-align: center; }
  .login-box h1 { font-size: 18px; margin-bottom: 4px; }
  .login-box p { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  #panel { display: none; padding: 2rem; max-width: 960px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem; }
  .stat { background: #111; border: 1px solid #222; border-radius: 10px; padding: 1rem; }
  .stat-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 500; }
  .card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 14px; font-weight: 500; margin-bottom: 1rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .form-full { margin-bottom: 8px; }
  .form-bottom { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  input, select { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #e0e0e0; outline: none; }
  input:focus, select:focus { border-color: #444; }
  .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid; }
  .btn-primary { background: #1a3a5c; color: #7eb8f7; border-color: #2a5a8c; }
  .btn-warning { background: #3a2a0a; color: #f0a030; border-color: #5a4010; }
  .btn-success { background: #0a2a1a; color: #40c070; border-color: #1a5a30; }
  .btn-danger { background: #2a0a0a; color: #f07070; border-color: #5a1a1a; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px 12px; text-align: left; font-weight: 500; color: #666; border-bottom: 1px solid #222; }
  td { padding: 10px 12px; border-bottom: 1px solid #1a1a1a; }
  tr:last-child td { border-bottom: none; }
  tr.banned td { opacity: 0.4; text-decoration: line-through; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; }
  .badge-global { background: #1a3a5c; color: #7eb8f7; }
  .badge-script { background: #2a2a2a; color: #888; }
  .badge-active { background: #0a2a1a; color: #40c070; }
  .badge-banned { background: #2a0a0a; color: #f07070; }
  .badge-expired { background: #3a2a0a; color: #f0a030; }
  .actions { display: flex; gap: 6px; justify-content: flex-end; }
  .empty { text-align: center; padding: 3rem; color: #444; font-size: 14px; }
  .msg { font-size: 12px; margin-top: 8px; padding: 8px 12px; border-radius: 8px; }
  .msg-error { background: #2a0a0a; color: #f07070; border: 1px solid #5a1a1a; }
  .msg-success { background: #0a2a1a; color: #40c070; border: 1px solid #1a5a30; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Jmods Panel</h1>
    <p>Acceso restringido</p>
    <input type="password" id="password-input" placeholder="Contraseña de admin..." style="margin-bottom:12px;" />
    <button class="btn btn-primary" style="width:100%;" onclick="login()">Entrar</button>
    <div id="login-error" class="msg msg-error" style="display:none;">Contraseña incorrecta</div>
  </div>
</div>

<div id="panel">
  <div class="header">
    <div>
      <h1 style="font-size:20px; font-weight:500;">Jmods Whitelist Panel</h1>
      <p style="font-size:13px; color:#666; margin-top:4px;">joao_mods</p>
    </div>
    <button class="btn btn-danger" onclick="logout()">Salir</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">—</div></div>
    <div class="stat"><div class="stat-label">Activos</div><div class="stat-value" style="color:#40c070" id="stat-active">—</div></div>
    <div class="stat"><div class="stat-label">Baneados</div><div class="stat-value" style="color:#f07070" id="stat-banned">—</div></div>
  </div>

  <div class="card">
    <div class="card-title">Agregar usuario</div>
    <div class="form-grid">
      <input id="new-username" placeholder="Username de Roblox" />
      <input id="new-userid" placeholder="UserId (número)" type="number" />
    </div>
    <div class="form-full">
      <input id="new-hwid" placeholder="HWID (del embed de Discord)" />
    </div>
    <div class="form-bottom">
      <select id="new-script">
        <option value="global">global</option>
        <option value="Jailxd">Jailxd</option>
        <option value="BloxVIP">BloxVIP</option>
      </select>
      <input id="new-expires" type="date" title="Fecha de expiración (dejar vacío = nunca expira)" />
      <button class="btn btn-primary" onclick="addUser()">+ Agregar</button>
    </div>
    <div id="add-msg" style="display:none;"></div>
  </div>

  <div class="card">
    <div class="card-title">Usuarios registrados</div>
    <div id="user-table-container"><div class="empty">Cargando...</div></div>
  </div>
</div>

<script>
let adminPassword = ''
let users = []

async function login() {
    const pw = document.getElementById('password-input').value.trim()
    if (!pw) return
    adminPassword = pw

    const errEl = document.getElementById('login-error')
    errEl.style.display = 'none'

    const ok = await fetchUsers()
    if (ok) {
        document.getElementById('login-screen').style.display = 'none'
        document.getElementById('panel').style.display = 'block'
    } else {
        errEl.style.display = 'block'
        adminPassword = ''
    }
}

function logout() {
    adminPassword = ''
    document.getElementById('login-screen').style.display = 'flex'
    document.getElementById('panel').style.display = 'none'
    document.getElementById('password-input').value = ''
}

document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login()
})

async function fetchUsers() {
    try {
        const res = await fetch('/api/admin', {
            headers: { 'x-admin-password': adminPassword }
        })
        if (res.status === 403) return false
        const data = await res.json()
        users = data.users || []
        renderTable()
        updateStats()
        return true
    } catch {
        return false
    }
}

function updateStats() {
    const banned = users.filter(u => u.banned).length
    document.getElementById('stat-total').textContent  = users.length
    document.getElementById('stat-active').textContent = users.length - banned
    document.getElementById('stat-banned').textContent = banned
}

function getStatus(u) {
    if (u.banned) return 'banned'
    if (u.expires !== 0 && Date.now() / 1000 > u.expires) return 'expired'
    return 'active'
}

function formatExpires(ts) {
    if (!ts || ts === 0) return 'Nunca'
    return new Date(ts * 1000).toLocaleDateString('es')
}

function renderTable() {
    const container = document.getElementById('user-table-container')
    if (users.length === 0) {
        container.innerHTML = '<div class="empty">No hay usuarios registrados</div>'
        return
    }
    const rows = users.map(u => {
        const status = getStatus(u)
        const statusBadge = {
            active:  '<span class="badge badge-active">Activo</span>',
            banned:  '<span class="badge badge-banned">Baneado</span>',
            expired: '<span class="badge badge-expired">Expirado</span>'
        }[status]
        const scriptBadge = u.script_name === 'global'
            ? '<span class="badge badge-global">global</span>'
            : `<span class="badge badge-script">${u.script_name}</span>`
        const actionBtn = u.banned
            ? `<button class="btn btn-success btn-sm" onclick="toggleBan('${u.id}', false)">Activar</button>`
            : `<button class="btn btn-warning btn-sm" onclick="toggleBan('${u.id}', true)">Banear</button>`
        return `
        <tr class="${u.banned ? 'banned' : ''}">
            <td>${u.username}</td>
            <td style="color:#666;">${u.user_id}</td>
            <td>${scriptBadge}</td>
            <td style="color:#666;">${formatExpires(u.expires)}</td>
            <td>${statusBadge}</td>
            <td><div class="actions">
                ${actionBtn}
                <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">Borrar</button>
            </div></td>
        </tr>`
    }).join('')
    container.innerHTML = `
    <table>
        <thead><tr>
            <th>Usuario</th><th>UserId</th><th>Lista</th>
            <th>Expira</th><th>Estado</th>
            <th style="text-align:right;">Acciones</th>
        </tr></thead>
        <tbody>${rows}</tbody>
    </table>`
}

async function addUser() {
    const username    = document.getElementById('new-username').value.trim()
    const user_id     = document.getElementById('new-userid').value.trim()
    const hwid        = document.getElementById('new-hwid').value.trim()
    const script_name = document.getElementById('new-script').value
    const expiresDate = document.getElementById('new-expires').value
    const msgEl       = document.getElementById('add-msg')

    if (!username || !user_id || !hwid) {
        msgEl.className = 'msg msg-error'
        msgEl.textContent = 'Rellena username, userId y HWID'
        msgEl.style.display = 'block'
        return
    }

    const expires = expiresDate ? Math.floor(new Date(expiresDate).getTime() / 1000) : 0

    const res = await fetch('/api/admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
        body: JSON.stringify({ username, user_id, hwid, script_name, expires })
    })
    const data = await res.json()

    if (data.success) {
        msgEl.className = 'msg msg-success'
        msgEl.textContent = '✓ Usuario agregado correctamente'
        msgEl.style.display = 'block'
        document.getElementById('new-username').value = ''
        document.getElementById('new-userid').value   = ''
        document.getElementById('new-hwid').value     = ''
        document.getElementById('new-expires').value  = ''
        fetchUsers()
        setTimeout(() => msgEl.style.display = 'none', 3000)
    } else {
        msgEl.className = 'msg msg-error'
        msgEl.textContent = 'Error: ' + (data.error || 'desconocido')
        msgEl.style.display = 'block'
    }
}

async function toggleBan(id, banned) {
    await fetch('/api/admin', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
        body: JSON.stringify({ id, banned })
    })
    fetchUsers()
}

async function deleteUser(id) {
    if (!confirm('¿Borrar este usuario permanentemente?')) return
    await fetch('/api/admin', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
        body: JSON.stringify({ id })
    })
    fetchUsers()
}
</script>
</body>
</html>
